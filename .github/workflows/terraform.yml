name: terraform

on:
  push:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install provider plugins
        working-directory: playground/http
        run: |
          set -e
          PLUGIN_DIR=.terraform/plugins/registry.terraform.io/hashicorp
          mkdir -p "$PLUGIN_DIR/http/3.6.0/linux_amd64"
          mkdir -p "$PLUGIN_DIR/local/2.9.0/linux_amd64"
          curl -sSL -o /tmp/http.zip https://releases.hashicorp.com/terraform-provider-http/3.6.0/terraform-provider-http_3.6.0_linux_amd64.zip
          curl -sSL -o /tmp/local.zip https://releases.hashicorp.com/terraform-provider-local/2.9.0/terraform-provider-local_2.9.0_linux_amd64.zip
          unzip -o -j /tmp/http.zip -d "$PLUGIN_DIR/http/3.6.0/linux_amd64/"
          unzip -o -j /tmp/local.zip -d "$PLUGIN_DIR/local/2.9.0/linux_amd64/"
          mv "$PLUGIN_DIR/http/3.6.0/linux_amd64/terraform-provider-http_v3.6.0" "$PLUGIN_DIR/http/3.6.0/linux_amd64/terraform-provider-http_v3.6.0_x4"
          mv "$PLUGIN_DIR/local/2.9.0/linux_amd64/terraform-provider-local_v2.9.0" "$PLUGIN_DIR/local/2.9.0/linux_amd64/terraform-provider-local_v2.9.0_x4"
          chmod +x "$PLUGIN_DIR/http/3.6.0/linux_amd64/terraform-provider-http_v3.6.0_x4"
          chmod +x "$PLUGIN_DIR/local/2.9.0/linux_amd64/terraform-provider-local_v2.9.0_x4"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: terraform init
        working-directory: playground/http
        run: terraform init -input=false -no-color

      - name: terraform apply
        working-directory: playground/http
        run: terraform apply -auto-approve
